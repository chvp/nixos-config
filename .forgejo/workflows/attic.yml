name: Attic

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: native
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
      - name: Set up nix
        run: |
          mkdir -p $HOME/.config/nix
          cat <<CONFIG > $HOME/.config/nix/nix.conf
          access-tokens = github.com=${{ secrets.ACCESS_TOKEN_GITHUB }}
          cores = 2
          max-jobs = 2
          CONFIG
      - name: Set up attic
        run: attic login --set-default chvp https://attic.chvp.be "${{ secrets.ATTIC_AUTH_TOKEN }}"
      - name: Build and cache elendel
        run: |
          nix build -L --no-link .#nixosConfigurations.elendel.config.system.build.toplevel
          nix eval --json ".#nixosConfigurations.elendel.config.system.build.toplevel.outPath" | sed 's/"\(.*\)"/\1/' | attic push chvp --stdin
        if: ${{ always() }}
      - name: Build and cache kharbranth
        run: |
          nix build -L --no-link .#nixosConfigurations.kharbranth.config.system.build.toplevel
          nix eval --json ".#nixosConfigurations.kharbranth.config.system.build.toplevel.outPath" | sed 's/"\(.*\)"/\1/' | attic push chvp --stdin
        if: ${{ always() }}
      - name: Build and cache kholinar
        run: |
          nix build -L --no-link .#nixosConfigurations.kholinar.config.system.build.toplevel
          nix eval --json ".#nixosConfigurations.kholinar.config.system.build.toplevel.outPath" | sed 's/"\(.*\)"/\1/' | attic push chvp --stdin
        if: ${{ always() }}
      - name: Build and cache marabethia
        run: |
          nix build -L --no-link .#nixosConfigurations.marabethia.config.system.build.toplevel
          nix eval --json ".#nixosConfigurations.marabethia.config.system.build.toplevel.outPath" | sed 's/"\(.*\)"/\1/' | attic push chvp --stdin
        if: ${{ always() }}
      - name: Build and cache purelake
        run: |
          nix build -L --no-link .#nixosConfigurations.purelake.config.system.build.toplevel
          nix eval --json ".#nixosConfigurations.purelake.config.system.build.toplevel.outPath" | sed 's/"\(.*\)"/\1/' | attic push chvp --stdin
        if: ${{ always() }}
